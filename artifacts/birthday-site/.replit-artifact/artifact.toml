kind = "web"
previewPath = "/"
title = "Birthday Site"
version = "1.0.0"
id = "artifacts/birthday-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25113

[services.development]
run = "pnpm --filter @workspace/birthday-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/birthday-site", "run", "build" ]
publicDir = "artifacts/birthday-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25113"
BASE_PATH = "/"
